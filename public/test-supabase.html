<!DOCTYPE html>
<html>
<head>
  <title>Test Supabase Connection</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Supabase Connection</h1>
  
  <div id="status">Testing...</div>
  
  <script>
    const SUPABASE_URL = 'https://nsvcznuvgdibscblixqd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SykQYawz3iufQ41e6HSqDw_tpmHmp1h';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function testConnection() {
      const statusEl = document.getElementById('status');
      
      try {
        // Test 1: Check if we can connect (with timeout)
        statusEl.innerHTML = 'Testing connection... (10s timeout)';
        
        // Create a timeout promise
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('Connection timeout after 10 seconds')), 10000);
        });
        
        // Race the Supabase call against the timeout
        const { data, error } = await Promise.race([
          supabase.auth.getSession(),
          timeoutPromise
        ]);
        
        if (error) {
          statusEl.innerHTML = `Connection error: ${error.message}`;
          statusEl.style.color = 'red';
        } else {
          statusEl.innerHTML = '✓ Connected to Supabase!';
          statusEl.style.color = 'green';
          
          // Test 2: Try to login
          const testEmail = 'owner@fitlife.com';
          const testPassword = 'password123';
          
          const loginStatus = document.createElement('div');
          loginStatus.id = 'login-status';
          loginStatus.innerHTML = `Trying to login as ${testEmail}...`;
          document.body.appendChild(loginStatus);
          
          const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
            email: testEmail,
            password: testPassword
          });
          
          if (loginError) {
            loginStatus.innerHTML = `Login failed: ${loginError.message}`;
            loginStatus.style.color = 'red';
            
            // Suggest fixes based on error
            if (loginError.message.includes('Invalid login credentials')) {
              const fixMsg = document.createElement('div');
              fixMsg.innerHTML = '<br><strong>Fix:</strong> User does not exist. Create user in Supabase Auth.';
              fixMsg.style.color = 'orange';
              loginStatus.appendChild(fixMsg);
            } else if (loginError.message.includes('Email not confirmed')) {
              const fixMsg = document.createElement('div');
              fixMsg.innerHTML = '<br><strong>Fix:</strong> User needs to confirm email. Check Supabase Auth users.';
              fixMsg.style.color = 'orange';
              loginStatus.appendChild(fixMsg);
            }
          } else {
            loginStatus.innerHTML = `✓ Login successful! User ID: ${loginData.user.id}`;
            loginStatus.style.color = 'green';
          }
        }
      } catch (err) {
        statusEl.innerHTML = `Error: ${err.message}`;
        statusEl.style.color = 'red';
        
        // Suggest fixes based on error type
        if (err.message.includes('timeout')) {
          const fixMsg = document.createElement('div');
          fixMsg.innerHTML = '<br><strong>Likely issues:</strong><br>1. Supabase URL wrong<br>2. CORS blocking<br>3. Network issue<br>4. API key wrong';
          fixMsg.style.color = 'orange';
          statusEl.appendChild(fixMsg);
        }
      }
    }
    
    testConnection();
  </script>
</body>
</html>
